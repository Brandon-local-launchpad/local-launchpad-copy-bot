<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client — Local Launchpad</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
    --accent: #6c63ff; --accent2: #5a52e0; --success: #4ade80;
    --danger: #f87171; --warning: #fbbf24; --text: #e2e8f0; --muted: #94a3b8;
    --border: #2d3148; --r: 10px; --font: 'Inter', system-ui, sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; padding: 2rem; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .breadcrumb { color: var(--muted); font-size: 13px; margin-bottom: 1.5rem; }
  .breadcrumb a { color: var(--muted); }
  .breadcrumb a:hover { color: var(--text); }
  .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2rem; gap: 1rem; }
  h1 { font-size: 1.5rem; font-weight: 700; }
  .client-meta { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; border: none; border-radius: var(--r); font-family: var(--font); font-size: 14px; font-weight: 600; padding: 10px 18px; cursor: pointer; transition: background 0.15s; text-decoration: none; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
  .tab { padding: 8px 16px; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-count { background: var(--surface2); border-radius: 10px; padding: 1px 7px; font-size: 11px; margin-left: 4px; }
  .page-list { display: grid; gap: .75rem; }
  .page-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 1rem 1.25rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; cursor: pointer; transition: border-color 0.15s; }
  .page-row:hover { border-color: var(--accent); }
  .page-title { font-weight: 600; font-size: .9rem; }
  .page-slug { color: var(--muted); font-size: 12px; font-family: monospace; margin-top: 2px; }
  .page-actions { display: flex; gap: .5rem; align-items: center; flex-shrink: 0; }
  .badge { border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 700; }
  .badge-ok   { background: rgba(74,222,128,.15); color: var(--success); }
  .badge-warn { background: rgba(251,191,36,.15);  color: var(--warning); }
  .badge-none { background: var(--surface2); color: var(--muted); }
  .btn-danger-sm { background: transparent; color: var(--danger); border: 1px solid transparent; border-radius: 6px; padding: 4px 8px; font-size: 12px; cursor: pointer; font-family: var(--font); font-weight: 600; }
  .btn-danger-sm:hover { border-color: var(--danger); }
  .empty { color: var(--muted); padding: 2rem; text-align: center; }
  .gen-date { color: var(--muted); font-size: 11px; }
</style>
</head>
<body>

<div class="breadcrumb"><a href="/clients.html">← Clients</a></div>

<div class="header">
  <div>
    <h1 id="clientName">Loading…</h1>
    <div class="client-meta" id="clientMeta"></div>
  </div>
  <a id="generateLink" href="#" class="btn btn-primary">Generate Pages</a>
</div>

<div class="tabs" id="tabs"></div>
<div class="page-list" id="pageList"></div>

<script>
  const params   = new URLSearchParams(location.search);
  const clientId = params.get('id');
  if (!clientId) location.href = '/clients.html';

  const PAGE_TYPE_ORDER = ['homepage','category','service','location','location-category'];
  const PAGE_TYPE_LABEL = { homepage: 'Homepage', category: 'Category', service: 'Service', location: 'Location', 'location-category': 'Location-Category' };

  let allPages = [];
  let activeType = null;

  async function load() {
    const [clientRes, pagesRes] = await Promise.all([
      fetch(`/api/clients/${clientId}`),
      fetch(`/api/clients/${clientId}/pages`),
    ]);
    if (!clientRes.ok) { location.href = '/clients.html'; return; }
    const client = await clientRes.json();
    allPages = (await pagesRes.json()).pages || [];

    document.title = `${client.name} — Local Launchpad`;
    document.getElementById('clientName').textContent = client.name;
    document.getElementById('clientMeta').textContent = `${client.trade} · Created ${fmtDate(client.created_at)}`;
    document.getElementById('generateLink').href = `/generate?clientId=${clientId}`;

    const types = PAGE_TYPE_ORDER.filter(t => allPages.some(p => p.page_type === t));
    if (!activeType || !types.includes(activeType)) activeType = types[0] || null;

    renderTabs(types);
    renderPages();
  }

  function renderTabs(types) {
    const tabs = document.getElementById('tabs');
    tabs.innerHTML = types.map(t => {
      const count = allPages.filter(p => p.page_type === t).length;
      return `<div class="tab${t === activeType ? ' active' : ''}" onclick="switchTab('${t}')">
        ${PAGE_TYPE_LABEL[t]}<span class="tab-count">${count}</span>
      </div>`;
    }).join('');
  }

  function renderPages() {
    const list = document.getElementById('pageList');
    const pages = allPages.filter(p => p.page_type === activeType);
    if (!pages.length) { list.innerHTML = '<div class="empty">No pages yet.</div>'; return; }
    list.innerHTML = pages.map(p => {
      const issueCount = (p.issues || []).length;
      const badge = !p.generated_at
        ? `<span class="badge badge-none">Not generated</span>`
        : issueCount > 0
          ? `<span class="badge badge-warn">${issueCount} issue${issueCount > 1 ? 's' : ''}</span>`
          : `<span class="badge badge-ok">✓ Clean</span>`;
      const genDate = p.generated_at ? `<span class="gen-date">${fmtDate(p.generated_at)}</span>` : '';
      return `<div class="page-row" onclick="openPage('${p.id}')">
        <div>
          <div class="page-title">${esc(p.page_title)}</div>
          <div class="page-slug">${esc(p.url_slug || '')}</div>
        </div>
        <div class="page-actions">
          ${genDate}
          ${badge}
          <button class="btn-danger-sm" onclick="event.stopPropagation();deletePage('${p.id}','${esc(p.page_title)}')">Delete</button>
        </div>
      </div>`;
    }).join('');
  }

  function switchTab(type) { activeType = type; renderTabs(PAGE_TYPE_ORDER.filter(t => allPages.some(p => p.page_type === t))); renderPages(); }
  function openPage(id) { location.href = `/page.html?id=${id}&clientId=${clientId}`; }

  async function deletePage(id, title) {
    if (!confirm(`Delete "${title}"? This cannot be undone.`)) return;
    await fetch(`/api/clients/${clientId}/pages/${id}`, { method: 'DELETE' });
    load();
  }

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function fmtDate(s) { return new Date(s).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }); }

  load();
</script>
</body>
</html>
